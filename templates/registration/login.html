{% extends "base.html" %}

{% block title %}Log In - Nandy Engineering Works{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 60px auto 0;">
    <h1>Nandy Engineering Works</h1>
    <p class="subtitle">Log in to manage items and billing</p>

    {% if form.errors %}
    <ul class="errorlist">
        <li>Wrong username or password. Please try again.</li>
    </ul>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="field">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" autofocus required>
        </div>
        <div class="field">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
